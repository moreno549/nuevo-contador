<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body{margin:0;background:transparent;font-family:'Orbitron',sans-serif;color:#ff0000;overflow:hidden}
        #panel_m{display:block;padding:15px}
        .f-c{display:flex;justify-content:center;align-items:center;gap:25px;margin-top:15px}
        #glob_v{width:500px;height:380px;position:relative;border:1px solid #ff000022;border-radius:12px;cursor:grab}
        .inf_v{text-align:left;font-size:13px;min-width:220px;color:#ff0000}
        .loc-tag{position:absolute;color:#fff;font-size:9px;font-weight:700;pointer-events:none;display:flex;align-items:center;gap:5px;text-transform:uppercase;z-index:10;white-space:nowrap}
        #lst_v{margin-top:8px;font-size:11px;max-height:180px;overflow-y:auto;border-top:1px solid #ff0000}
        .f-m{width:16px;height:auto}
        .contador-activos{font-size:14px;color:#00ff00;margin-top:5px;font-weight:bold;}
    </style>
</head>
<body>
    <div id="panel_m">
        <h2 style="text-align:center;letter-spacing:6px;color:#ff0000;font-weight:700">VISITANTES</h2>
        <div class="f-c">
            <div id="glob_v"></div>
            <div class="inf_v">
                <div id="_0x_t" style="font-size:22px">--:--:--</div>
                <div id="_0x_d" style="margin-bottom:10px;opacity:0.8">---</div>
                <div style="font-size:11px">SISTEMA: <span style="color:#00ff00">ONLINE</span></div>
                <div class="contador-activos">EN SALA: <span id="num_activos">0</span></div>
                <h4 style="margin:12px 0 5px 0;border-bottom:1px solid #ff0000">HISTORIAL EN VIVO:</h4>
                <div id="lst_v"></div>
            </div>
        </div>
    </div>

    <script>
        var _0x_cfg = {
            apiKey: "AIzaSyBceShg6R5GJsev9d12sS3WD1VmFyVf8IQ", 
            authDomain: "globo-vistantes.firebaseapp.com", 
            projectId: "globo-vistantes", 
            storageBucket: "globo-vistantes.firebasestorage.app", 
            messagingSenderId: "699028130724", 
            appId: "1:699028130724:web:ba267bf0856438fd26cf31"
        };
                
        if (!firebase.apps.length) {
            firebase.initializeApp(_0x_cfg);
        }
        var _0x_baseDatos = firebase.firestore();
        var miSesionId = "user_" + Math.random().toString(36).substring(2, 15) + Date.now();

        async function _0x_start() {
            let userLang = (navigator.language || navigator.userLanguage).split('-')[0].toLowerCase();
            let paisRescate = "España"; 
            let codRescate = "es"; 
            let ltR = 38.2669; 
            let lgR = -0.6984;
                        
            if(userLang === "mx") { paisRescate = "México"; codRescate = "mx"; ltR = 19.4326; lgR = -99.1332; }
            else if(userLang === "ar") { paisRescate = "Argentina"; codRescate = "ar"; ltR = -34.6037; lgR = -58.3816; }
            else if(userLang === "co") { paisRescate = "Colombia"; codRescate = "co"; ltR = 4.7110; lgR = -74.0721; }
            else if(userLang === "cl") { paisRescate = "Chile"; codRescate = "cl"; ltR = -33.4489; lgR = -70.6693; }

            let datosUsuario = {
                city: "Elche, Valencia", 
                country: paisRescate, 
                code: codRescate, 
                lat: ltR, 
                lng: lgR, 
                t: Date.now()
            };

            try {
                const r = await fetch('https://ipwho.is/');
                if (r.ok) {
                    const d = await r.json();
                    if(d && d.success) {
                        let nombreCiudad = d.city || "Elche";
                        if(nombreCiudad.toLowerCase() === "elx") nombreCiudad = "Elche";
                        let nombreRegion = d.region || "Valencia";
                        
                        datosUsuario = {
                            city: nombreCiudad + ", " + nombreRegion,
                            country: d.country || paisRescate,
                            code: d.country_code ? d.country_code.toLowerCase() : codRescate,
                            lat: d.latitude || ltR,
                            lng: d.longitude || lgR,
                            t: Date.now()
                        };
                    }
                }
            } catch(e) { 
                console.warn("API básica activa."); 
            }

            try {
                // 1. Guarda en vistas_privadas
                await _0x_baseDatos.collection('vistas_privadas').doc(miSesionId).set(datosUsuario);
                
                // 2. CORRECCIÓN DE SEGURIDAD PARA EL ID DEL DOCUMENTO:
                // Reemplaza comas, acentos y espacios por guiones bajos para asegurar que Firebase lo acepte al 100%
                let textoLimpio = (datosUsuario.city + "_" + datosUsuario.country)
                    .normalize("NFD").replace(/[\u0300-\u036f]/g, "") // Quita acentos (España -> Espana)
                    .replace(/[^a-zA-Z0-9]/g, "_"); // Cambia espacios y comas por barras bajas

                await _0x_baseDatos.collection('vistas_ciudades').doc(textoLimpio).set({
                    city_code: datosUsuario.code.toUpperCase(),
                    name: datosUsuario.city + ", " + datosUsuario.country, // Aquí dentro sí se guarda bonito: "Elche, Valencia, España"
                    last_view: firebase.firestore.FieldValue.serverTimestamp(),
                    views: firebase.firestore.FieldValue.increment(1)
                }, { merge: true });

            } catch(ex) { 
                console.error("Error crítico guardando en Firebase:", ex); 
            }

            function salirDeSala() {
                _0x_baseDatos.collection('vistas_privadas').doc(miSesionId).delete();
            }
            window.addEventListener('beforeunload', salirDeSala);
            window.addEventListener('unload', salirDeSala);

            // Globo Three.js
            const s = new THREE.Scene();
            const c = new THREE.PerspectiveCamera(45, 500/380, 0.1, 1000);
            const rn = new THREE.WebGLRenderer({antialias:true, alpha:true});
            rn.setSize(500, 380);
            document.getElementById('glob_v').appendChild(rn.domElement);
                        
            const g = new THREE.Mesh(new THREE.SphereGeometry(1, 64, 64), new THREE.MeshPhongMaterial({
                map: new THREE.TextureLoader().load("https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg"),
                emissive: new THREE.Color("#ff0000"), emissiveIntensity: 0.08, transparent: true
            }));
            s.add(g);
            s.add(new THREE.AmbientLight(0xffffff, 1.4));
            c.position.z = 3.1;
                        
            let mks=[], dr=false, px=0;
            const cn = document.getElementById('glob_v');
                        
            cn.onmousedown = e => {dr=true; px=e.clientX};
            window.onmouseup = () => {dr=false};
            window.onmousemove = e => {if(dr){g.rotation.y += (e.clientX-px)*0.007; px=e.clientX}};
                        
            _0x_baseDatos.collection('vistas_privadas').orderBy('t', 'desc').onSnapshot(sn => {
                let h = "";
                mks.forEach(m => { g.remove(m.d); if(m.t) m.t.remove(); });
                mks = [];
                let usuariosFiltradosActivos = 0;

                sn.forEach(doc => {
                    const u = doc.data();
                                        
                    if (u.city === "Probando Conexión" || u.city === "Invitado" || u.city === "Bloqueo" || u.city === "Desconocido") {
                        return; 
                    }

                    usuariosFiltradosActivos++;
                    h += '<div><img src="https://flagcdn.com/w20/'+u.code+'.png" class="f-m"> '+u.city+', '+u.country+'</div>';
                                        
                    if(u.lat && u.lng) {
                        const p = (90-u.lat)*(Math.PI/180), t = (u.lng+180)*(Math.PI/180);
                        const ps = new THREE.Vector3(-1.03*Math.sin(p)*Math.cos(t), 1.03*Math.cos(p), 1.03*Math.sin(p)*Math.sin(t));
                        const d = new THREE.Mesh(new THREE.SphereGeometry(0.02, 16, 16), new THREE.MeshBasicMaterial({color:0x00ff00}));
                        d.position.copy(ps);
                        g.add(d);
                                                
                        const tg = document.createElement('div');
                        tg.className = 'loc-tag';
                        tg.innerHTML = u.city+', '+u.country+' <img src="https://flagcdn.com/w20/'+u.code+'.png" class="f-m">';
                        cn.appendChild(tg);
                        mks.push({d, t:tg, ps});
                    }
                });
                                
                document.getElementById('num_activos').textContent = usuariosFiltradosActivos;
                document.getElementById('lst_v').innerHTML = h;
            });

            function an() {
                requestAnimationFrame(an);
                if(!dr) g.rotation.y += 0.003;
                mks.forEach(m => {
                    const v = m.ps.clone().applyQuaternion(g.quaternion).project(c);
                    if(v.z < 1) {
                        m.t.style.display = 'flex';
                        m.t.style.left = (v.x*0.5+0.5)*500+'px';
                        m.t.style.top = (v.y*-0.5+0.5)*380+'px';
                    } else { m.t.style.display = 'none'; }
                });
                rn.render(s, c);
            }
            an();

            setInterval(() => {
                const n = new Date();
                document.getElementById("_0x_t").textContent = n.toLocaleTimeString();
                document.getElementById("_0x_d").textContent = n.toLocaleDateString("es-ES", {weekday:"long", day:"numeric", month:"long"});
            }, 1000);
        }

        _0x_start();
    </script>
</body>
</html>
